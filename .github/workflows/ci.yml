name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Type Check, Lint, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_BFF_BASE_URL: http://localhost:8080
        run: npm run build
